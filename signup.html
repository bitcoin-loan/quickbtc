<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - QuickBTC</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<section class="auth-container">
  <h1>Create Your Account</h1>

  <form id="signupForm" class="signup-form">

    <input type="text" id="signupName" placeholder="Full Name" required>

    <input type="email" id="signupEmail" placeholder="Email Address" required>

    <input type="password" id="signupPassword" placeholder="Password" required>

    <input type="text" id="signupWallet" placeholder="Bitcoin Wallet Address" required>

    <button type="submit">Create Account</button>

    <p id="signupMessage" class="form-message"></p>

  </form>

  <p class="login-link">
    Already have an account?
    <a href="login.html">Login here</a>
  </p>

</section>

<script>
document.getElementById("signupForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const name = document.getElementById("signupName").value.trim();
  const email = document.getElementById("signupEmail").value.trim();
  const password = document.getElementById("signupPassword").value;
  const wallet = document.getElementById("signupWallet").value.trim();
  const message = document.getElementById("signupMessage");

  // Basic wallet validation
  if (wallet.length < 26 || wallet.length > 62) {
    message.innerText = "❌ Invalid Bitcoin wallet address.";
    message.style.color = "red";
    return;
  }

  // Get stored users
  const users = JSON.parse(localStorage.getItem("users") || "[]");

  // Check if email already exists
  if (users.some(user => user.email === email)) {
    message.innerText = "❌ Email already registered.";
    message.style.color = "red";
    return;
  }

  // Save new user
  users.push({
    name: name,
    email: email,
    password: password,
    wallet: wallet,
    loans: []
  });

  localStorage.setItem("users", JSON.stringify(users));

  message.innerText = "✅ Account created successfully! Redirecting...";
  message.style.color = "green";

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1500);
});
</script>

</body>
</html>
