<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - QuickBTC</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<section class="auth-container">
  <h1>Create Your Account</h1>

  <form id="signupForm" class="signup-form">

    <input type="text" id="signupName" placeholder="Full Name" required>

    <input type="email" id="signupEmail" placeholder="Email Address" required>

    <input type="password" id="signupPassword" placeholder="Password" required>

    <input type="text" id="signupWallet" placeholder="Bitcoin Wallet Address" required>

    <button type="submit">Create Account</button>

    <p id="signupMessage" class="form-message"></p>

  </form>

  <p class="login-link">
    Already have an account?
    <a href="login.html">Login here</a>
  </p>
</section>

<script>
const form = document.getElementById("signupForm");
const message = document.getElementById("signupMessage");

form.addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("signupName").value.trim();
  const email = document.getElementById("signupEmail").value.trim();
  const password = document.getElementById("signupPassword").value;
  const wallet = document.getElementById("signupWallet").value.trim();

  // Validate wallet address
  if(wallet.length < 26 || wallet.length > 62){
    message.innerText = "❌ Invalid Bitcoin wallet address";
    return;
  }

  // Get users from localStorage
  const users = JSON.parse(localStorage.getItem("users") || "[]");

  // Check if email already exists
  if(users.some(u => u.email === email)){
    message.innerText = "❌ Email already registered";
    return;
  }

  // Save new user
  users.push({name, email, password, wallet, loans: []});
  localStorage.setItem("users", JSON.stringify(users));

  message.innerText = "✅ Account created! Redirecting...";

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1500);
});
</script>

</body>
</html>
